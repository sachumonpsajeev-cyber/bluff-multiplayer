<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluff Royale + AI Bot</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a2a3a; color: white; text-align: center; margin: 0; padding: 20px; }
        .hidden { display: none; }
        
        /* Card Styling */
        .card {
            background: white; color: black; padding: 15px; margin: 5px;
            border-radius: 10px; display: inline-block; cursor: pointer;
            width: 50px; height: 80px; font-weight: bold; border: 3px solid transparent;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); transition: 0.2s; user-select: none;
        }
        .card:hover { transform: translateY(-5px); }
        .card.selected { border-color: #f1c40f; background: #fffde7; transform: scale(1.05); }
        
        /* Table Layout */
        #table-area { background: #27ae60; padding: 30px; border-radius: 100px; width: 250px; margin: 20px auto; border: 8px solid #3e2723; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        
        /* Buttons */
        button { padding: 12px 24px; font-size: 14px; cursor: pointer; border-radius: 5px; border: none; margin: 8px; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        #play-btn { background: #2ecc71; color: white; }
        #bluff-btn { background: #e74c3c; color: white; }
        #bot-btn { background: #9b59b6; color: white; }
        #join-btn { background: #3498db; color: white; }
        
        .player-tag { background: #34495e; padding: 8px 15px; margin: 5px; display: inline-block; border-radius: 20px; border: 1px solid #555; }
        #target-rank { font-size: 1.8rem; color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
    </style>
</head>
<body>

    <div id="join-screen">
        <h1>🃏 Bluff Multiplayer</h1>
        <p>Enter your name to start</p>
        <input type="text" id="name-input" placeholder="Your Name" style="padding: 12px; border-radius: 5px; border: none; width: 200px;">
        <br>
        <button id="join-btn" onclick="join()">Join Game</button>
    </div>

    <div id="lobby" class="hidden">
        <h2>Game Lobby</h2>
        <div id="player-list">Waiting for players...</div>
        <div style="margin-top: 20px;">
            <button id="bot-btn" onclick="addBot()">➕ Add AI Bot</button> 
            <button onclick="startGame()" style="background: #f39c12; color: white;">🚀 Start Game</button>
        </div>
    </div>

    <div id="game-board" class="hidden">
        <h2 id="turn-msg">Waiting for turn...</h2>
        
        <div id="table-area">
            <div style="font-size: 2.5rem; font-weight: bold;" id="pile-count">0</div>
            <div>Cards in Pile</div>
        </div>
        
        <p>Current Claim: <strong id="target-rank">None</strong></p>
        <p id="last-action" style="font-style: italic; color: #bdc3c7; min-height: 20px;"></p>

        <hr style="opacity: 0.1; margin: 20px 0;">
        
        <h3>Your Hand</h3>
        <div id="my-cards"></div>
        <br>
        <div style="margin-bottom: 50px;">
            <button id="play-btn" onclick="playCards()">Play Selected Cards</button>
            <button id="bluff-btn" onclick="callBluff()">CHALLENGE BLUFF!</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myHand = [];
        let selectedCards = [];

        // 1. Join Logic
        function join() {
            const name = document.getElementById('name-input').value;
            if(!name) return alert("Please enter a name!");
            socket.emit('join_game', name);
            document.getElementById('join-screen').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
        }

        // 2. Bot Logic
        function addBot() {
            socket.emit('add_bot');
        }

        socket.on('player_list_updated', (players) => {
            const list = document.getElementById('player-list');
            list.innerHTML = players.map(p => `<div class="player-tag">👤 ${p.name}</div>`).join('');
        });

        // 3. Game Start
        function startGame() { 
            socket.emit('start_game'); 
        }

        socket.on('game_started', (data) => {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            renderHand(data.hand);
            updateUI(data);
        });

        // 4. Playing Logic
        function renderHand(hand) {
            myHand = hand;
            selectedCards = []; 
            const container = document.getElementById('my-cards');
            container.innerHTML = '';
            
            hand.forEach((card) => {
                const el = document.createElement('div');
                el.className = 'card';
                el.innerText = card.rank + card.suit;
                if(card.suit === '♥' || card.suit === '♦') el.style.color = 'red';
                
                el.onclick = () => {
                    el.classList.toggle('selected');
                    const foundIndex = selectedCards.findIndex(c => c.rank === card.rank && c.suit === card.suit);
                    if(foundIndex > -1) selectedCards.splice(foundIndex, 1);
                    else selectedCards.push(card);
                };
                container.appendChild(el);
            });
        }

        function playCards() {
            if(selectedCards.length === 0) return alert("Select at least one card!");
            
            // ASKING FOR DYNAMIC RANK
            const claim = prompt("What rank are you claiming these are? (A, 2, 3... K)", "A");
            if(!claim) return;

            socket.emit('play_move', { 
                cards: selectedCards,
                claimedRank: claim.toUpperCase()
            });
        }

        function callBluff() { 
            socket.emit('call_bluff'); 
        }

        // 5. State Updates
        socket.on('new_hand', (hand) => renderHand(hand));

        socket.on('update_pile', (data) => updateUI(data));

        function updateUI(data) {
            document.getElementById('pile-count').innerText = data.count || 0;
            document.getElementById('turn-msg').innerText = `${data.nextPlayerName}'s Turn`;
            document.getElementById('target-rank').innerText = data.currentRank || "A";
        }

        socket.on('bluff_result', (data) => {
            alert(data.message);
        });

        socket.on('game_over', (data) => {
            alert("🏆 GAME OVER! " + data.winner + " is the champion!");
            location.reload(); 
        });
    </script>
</body>
</html>
